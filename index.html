<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Wimberley Watchtower</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🗼</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=IBM+Plex+Sans:wght@300;400;500&family=IBM+Plex+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e0e;
    --surface: #161616;
    --surface2: #1f1f1f;
    --border: #2a2a2a;
    --accent: #0bb8da;
    --accent2: #1ad157;
    --text: #e8e4dc;
    --text-muted: #a09890;
    --text-dim: #6a6560;
    --green: #2ecc71;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'IBM Plex Sans', sans-serif; font-weight: 300; min-height: 100vh; }

  header { background: var(--bg); padding: 0; position: sticky; top: 0; z-index: 100; }
  .header-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 64px; gap: 16px; padding: 0 24px; background: var(--surface); border: 1px solid var(--border); border-bottom: none; }
  .logo { display: flex; align-items: baseline; gap: 10px; flex-shrink: 0; cursor: pointer; min-width: 0; }
  .logo-main { font-family: 'Playfair Display', serif; font-weight: 900; font-size: 1.5rem; letter-spacing: -0.02em; color: var(--text); white-space: nowrap; }
  .logo-sub { font-family: 'IBM Plex Mono', monospace; font-size: 0.6rem; color: var(--text-muted); letter-spacing: 0.15em; text-transform: uppercase; white-space: nowrap; }
  .header-right { display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
  .refresh-btn { background: var(--accent); color: #0e0e0e; border: none; padding: 8px 18px; font-family: 'IBM Plex Sans', sans-serif; font-size: 0.78rem; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 7px; border-radius: 2px; }
  .refresh-btn:hover { filter: brightness(0.85); }
  .refresh-btn:active { transform: scale(0.97); }
  .refresh-btn.loading { opacity: 0.6; pointer-events: none; }
  .spin { display: inline-block; animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .filter-bar { background: var(--bg); padding: 0; position: sticky; top: 168px; z-index: 96; }
  .filter-bar-track { max-width: 1200px; margin: 0 auto; position: relative; display: flex; align-items: stretch; background: var(--surface); }
  .filter-inner { flex: 1; display: flex; gap: 0; overflow-x: auto; scrollbar-width: none; scroll-behavior: smooth; }
  .filter-inner::-webkit-scrollbar { display: none; }
  .tab-arrow { display: none; align-items: center; justify-content: center; background: var(--surface); border: none; color: var(--text-muted); font-size: 1rem; padding: 0 10px; cursor: pointer; transition: color 0.15s, background 0.15s; flex-shrink: 0; z-index: 2; }
  .tab-arrow:hover { color: var(--text); background: var(--surface2); }
  .tab-arrow.visible { display: flex; }
  .tab-arrow-left { border-right: 1px solid var(--border); }
  .tab-arrow-right { border-left: 1px solid var(--border); }
  .filter-tab { padding: 12px 20px; font-size: 0.75rem; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; white-space: nowrap; background: none; border-top: none; border-left: none; border-right: none; font-family: 'IBM Plex Sans', sans-serif; }
  .filter-tab:hover { color: var(--text); }
  .filter-tab.active { color: var(--accent2); border-bottom-color: var(--accent2); }

  /* ── STICKY STACK ─────────────────────────────────────────────────────────── */
  /* Single sticky wrapper — all bars move as one unit, no independent top values */
  .sticky-stack { position: sticky; top: 64px; z-index: 99; background: var(--bg); }

  /* DATE / CLOCK BAR */
  .date-bar { background: var(--bg); }
  .date-bar-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 32px; padding: 0 24px; background: var(--surface2); border-bottom: 1px solid var(--border); border-left: 1px solid var(--border); border-right: 1px solid var(--border); }
  .date-bar-date { font-family: 'IBM Plex Mono', monospace; font-size: 0.68rem; color: var(--text); letter-spacing: 0.05em; }
  .date-bar-clocks { display: flex; align-items: center; gap: 14px; font-family: 'IBM Plex Mono', monospace; font-size: 0.65rem; color: var(--text-muted); letter-spacing: 0.04em; }
  .date-bar-clocks span { display: flex; align-items: center; gap: 5px; }
  .date-bar-clocks .time-val { color: var(--text); font-size: 0.7rem; }
  .date-bar-clocks .time-label { color: var(--text-dim); font-size: 0.55rem; letter-spacing: 0.1em; text-transform: uppercase; }

  /* LOCAL ADVISORIES STRIP */
  .alert-strip { background: var(--bg); overflow: hidden; }
  .alert-strip-inner-wrap { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; height: 32px; overflow: hidden; position: relative; background: #1a0800; border-bottom: 1px solid #5a1a00; border-left: 1px solid var(--border); border-right: 1px solid var(--border); }
  .alert-strip-label { font-family: 'IBM Plex Mono', monospace; font-size: 0.6rem; font-weight: 500; letter-spacing: 0.15em; text-transform: uppercase; color: #ff6600; padding: 0 14px; white-space: nowrap; flex-shrink: 0; border-right: 1px solid #5a1a00; height: 100%; display: flex; align-items: center; gap: 6px; min-height: 32px; }
  .alert-strip-label .blink { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: #ff4400; box-shadow: 0 0 6px #ff4400; animation: pulse 1s ease-in-out infinite; }
  .alert-strip-track { flex: 1; overflow: hidden; position: relative; height: 32px; }
  .alert-strip-inner { display: flex; align-items: center; gap: 0; position: absolute; white-space: nowrap; animation: ticker 60s linear infinite; }
  .alert-strip-inner:hover { animation-play-state: paused; }
  @keyframes ticker { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
  .alert-item { display: inline-flex; align-items: center; gap: 10px; padding: 0 20px; height: 32px; cursor: pointer; transition: background 0.15s; text-decoration: none; }
  .alert-item:hover { background: rgba(255,102,0,0.08); }
  .alert-item-source { font-family: 'IBM Plex Mono', monospace; font-size: 0.58rem; color: #ff6600; letter-spacing: 0.08em; text-transform: uppercase; flex-shrink: 0; }
  .alert-item-title { font-size: 0.78rem; color: #e8c4a0; font-weight: 400; }
  .alert-item-time { font-family: 'IBM Plex Mono', monospace; font-size: 0.58rem; color: #7a4a2a; flex-shrink: 0; }
  .alert-sep { color: #5a2a0a; padding: 0 4px; font-size: 0.7rem; }
  .alert-strip-empty { font-family: 'IBM Plex Mono', monospace; font-size: 0.65rem; color: #5a3a2a; padding: 0 16px; height: 32px; display: inline-flex; align-items: center; }
  .burn-ban-chip { display: inline-flex; align-items: center; padding: 0 20px; height: 32px; text-decoration: none; flex-shrink: 0; }
  .burn-ban-chip:hover { background: rgba(255,80,0,0.1); }
  .burn-ban-chip-label { font-family: 'IBM Plex Mono', monospace; font-size: 0.7rem; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; color: #ff6600; }
  .burn-ban-dots { color: #5a2a0a; letter-spacing: 0.4em; font-size: 0.55rem; }

  /* SUB-BAR */
  .sub-bar { background: var(--bg); }
  .sub-bar-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; gap: 6px; height: 40px; padding: 0 16px; overflow-x: auto; scrollbar-width: none; background: var(--surface2); border-bottom: 1px solid var(--border); border-left: 1px solid var(--border); border-right: 1px solid var(--border); }
  .sub-bar-inner::-webkit-scrollbar { display: none; }
  .sub-btn { background: none; border: 1px solid var(--border); color: var(--text-muted); font-family: 'IBM Plex Mono', monospace; font-size: 0.68rem; letter-spacing: 0.06em; padding: 5px 11px; border-radius: 2px; text-decoration: none; display: inline-flex; align-items: center; gap: 5px; transition: all 0.15s; white-space: nowrap; cursor: pointer; flex-shrink: 0; }
  .sub-btn:hover { border-color: var(--accent); color: var(--accent); }
  .sub-btn-iss:hover { border-color: var(--accent2) !important; color: var(--accent2) !important; }
  .sub-bar-weather { display: flex; align-items: center; gap: 5px; font-family: 'IBM Plex Mono', monospace; font-size: 0.68rem; color: var(--text-muted); flex-shrink: 0; padding-right: 10px; border-right: 1px solid var(--border); margin-right: 4px; }
  .sub-bar-weather .wx-temp { color: var(--text); font-size: 0.72rem; font-weight: 500; }
  .sub-bar-weather .wx-icon { color: var(--accent2); flex-shrink: 0; }

  /* FILTER BAR */
  .filter-bar { background: var(--bg); transform: translateZ(0); }
  .filter-bar-track { max-width: 1200px; margin: 0 auto; position: relative; display: flex; align-items: stretch; background: var(--surface); border-bottom: 1px solid var(--border); border-left: 1px solid var(--border); border-right: 1px solid var(--border); }
  .filter-inner { flex: 1; display: flex; gap: 0; overflow-x: auto; scrollbar-width: none; scroll-behavior: smooth; }
  .filter-inner::-webkit-scrollbar { display: none; }
  .tab-arrow { display: none; align-items: center; justify-content: center; background: var(--surface); border: none; color: var(--text-muted); font-size: 1rem; padding: 0 10px; cursor: pointer; transition: color 0.15s, background 0.15s; flex-shrink: 0; z-index: 2; }
  .tab-arrow:hover { color: var(--text); background: var(--surface2); }
  .tab-arrow.visible { display: flex; }
  .tab-arrow-left { border-right: 1px solid var(--border); }
  .tab-arrow-right { border-left: 1px solid var(--border); }
  .filter-tab { padding: 12px 20px; font-size: 0.75rem; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; white-space: nowrap; background: none; border-top: none; border-left: none; border-right: none; font-family: 'IBM Plex Sans', sans-serif; }
  .filter-tab:hover { color: var(--text); }
  .filter-tab.active { color: var(--accent2); border-bottom-color: var(--accent2); }

  /* TOOLBAR */
  .toolbar { background: var(--bg); }
  .toolbar-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; padding: 10px 24px; background: var(--surface); border-left: 1px solid var(--border); border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); }
  .search-wrap { position: relative; flex: 1; min-width: 180px; }
  .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text-dim); font-size: 0.85rem; pointer-events: none; }
  .search-input { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); font-family: 'IBM Plex Sans', sans-serif; font-size: 0.8rem; padding: 7px 10px 7px 30px; border-radius: 2px; outline: none; transition: border-color 0.2s; }
  .search-input:focus { border-color: var(--accent2); }
  .search-input::placeholder { color: var(--text-dim); }
  .time-filter-group { display: flex; gap: 2px; }
  .time-btn { background: none; border: 1px solid var(--border); color: var(--text-muted); font-family: 'IBM Plex Mono', monospace; font-size: 0.65rem; letter-spacing: 0.05em; padding: 5px 10px; cursor: pointer; transition: all 0.15s; border-radius: 2px; white-space: nowrap; }
  .time-btn:hover { color: var(--text); border-color: var(--text-muted); }
  .time-btn.active { background: var(--accent2); border-color: var(--accent2); color: #0e0e0e; font-weight: 500; }

  main { max-width: 1200px; margin: 0 auto; padding: 28px 0; }
  .status-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 8px; padding: 0 24px; }
  .status-left { display: flex; align-items: center; gap: 10px; font-family: 'IBM Plex Mono', monospace; font-size: 0.7rem; color: var(--text-muted); }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); box-shadow: 0 0 6px var(--green); }
  .dot.loading { background: var(--accent2); box-shadow: 0 0 6px var(--accent2); animation: pulse 1s ease-in-out infinite; }
  .dot.error { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
  .story-count { font-family: 'IBM Plex Mono', monospace; font-size: 0.7rem; color: var(--text-dim); }

  .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 1px; background: var(--border); border: 1px solid var(--border); }
  .card { background: var(--surface); padding: 20px; transition: background 0.15s; display: flex; flex-direction: column; gap: 10px; cursor: pointer; text-decoration: none; color: inherit; }
  .card:hover { background: var(--surface2); }
  .card-meta { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .card-source { font-family: 'IBM Plex Mono', monospace; font-size: 0.62rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent2); }
  .card-lang { font-family: 'IBM Plex Mono', monospace; font-size: 0.58rem; color: var(--text-dim); letter-spacing: 0.05em; }
  .card-title { font-family: 'Playfair Display', serif; font-size: 1rem; font-weight: 700; line-height: 1.35; color: var(--text); }
  .card-summary { font-size: 0.82rem; line-height: 1.6; color: var(--text-muted); font-weight: 300; }
  .card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 4px; }
  .card-time { font-family: 'IBM Plex Mono', monospace; font-size: 0.62rem; color: var(--text-dim); }
  .card-arrow { font-size: 0.7rem; color: var(--text-dim); transition: color 0.15s, transform 0.15s; }
  .card:hover .card-arrow { color: var(--accent2); transform: translateX(3px); }

  .skeleton-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 1px; background: var(--border); border: 1px solid var(--border); }
  .skeleton-card { background: var(--surface); padding: 20px; display: flex; flex-direction: column; gap: 10px; }
  .skel { background: var(--surface2); border-radius: 2px; animation: shimmer 1.5s ease-in-out infinite; }
  @keyframes shimmer { 0%,100% { opacity: 0.4; } 50% { opacity: 0.8; } }

  /* LOADING OVERLAY — fixed to viewport center, works on any screen size */
  .loading-overlay { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); display: flex; flex-direction: column; align-items: center; gap: 14px; background: rgba(14,14,14,0.88); backdrop-filter: blur(4px); border: 1px solid var(--border); padding: 28px 40px; z-index: 200; pointer-events: none; border-radius: 4px; }
  .loading-overlay-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 10px var(--accent); animation: pulse 1s ease-in-out infinite; }
  .loading-overlay-text { font-family: 'IBM Plex Mono', monospace; font-size: 0.85rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); white-space: nowrap; }

  .empty-state { text-align: center; padding: 80px 24px; color: var(--text-muted); }
  .empty-state h3 { font-family: 'Playfair Display', serif; font-size: 1.4rem; margin-bottom: 8px; color: var(--text-dim); }
  .empty-state p { font-size: 0.85rem; line-height: 1.6; }

  .sources-panel { margin-top: 40px; border-top: 1px solid var(--border); padding: 20px 24px 0; }
  .sources-title { font-family: 'IBM Plex Mono', monospace; font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 12px; }
  .sources-list { display: flex; flex-wrap: wrap; gap: 8px; }
  .source-pill { font-family: 'IBM Plex Mono', monospace; font-size: 0.62rem; padding: 4px 10px; border: 1px solid var(--border); color: var(--text-muted); letter-spacing: 0.05em; border-radius: 2px; }
  .source-pill.ok { border-color: #1e3a1e; color: #4a9a4a; }
  .source-pill.err { border-color: #3a1e1e; color: #9a4a4a; }

  /* LOCAL ADVISORIES STRIP — see sticky-stack section above */

  /* SUB-BAR — see sticky-stack section above */

  @media (max-width: 600px) {
    .header-inner { height: 56px; }
    .sticky-stack { top: 56px; }
    .logo { flex-direction: column; align-items: flex-start; gap: 1px; }
    .logo-main { font-size: 1.2rem; }
    .logo-sub { font-size: 0.52rem; letter-spacing: 0.1em; }
    main { padding: 16px 0; }
    .news-grid, .skeleton-grid { grid-template-columns: 1fr; }
    .toolbar-inner { padding: 8px 16px; }
    .time-btn { padding: 5px 7px; font-size: 0.6rem; }
    .alert-strip-label span:last-child { display: none; }
    .sub-bar-inner { height: 34px; padding: 0 8px; gap: 4px; }
    .sub-btn { font-size: 0.58rem; padding: 3px 7px; gap: 3px; }
    .sub-btn svg { display: none; }
    .sub-bar-weather { gap: 3px; }
    .sub-bar-weather .wx-temp { font-size: 0.64rem; }
    .sub-bar-weather svg { width: 12px; height: 12px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo" onclick="filterBy('wimberley', document.querySelector('[onclick*=wimberley]')); document.getElementById('searchInput').value=''; setTimeFilter(168, document.querySelector('.time-btn[data-hours=\'168\']'));">
      <div class="logo-main">
        <span style="color:var(--text)">The </span><span style="color:var(--accent)">Wimberley </span><span style="color:var(--accent2)">Watchtower</span>
      </div>
      <div class="logo-sub">Situational Awareness Dashboard</div>
    </div>
    <div class="header-right">
      <button class="refresh-btn" id="refreshBtn" onclick="loadAllFeeds()">
        <span id="refreshIcon">↻</span> Refresh
      </button>
    </div>
  </div>
</header>

<div class="sticky-stack" id="stickyStack">

  <div class="date-bar" id="dateBar">
    <div class="date-bar-inner">
      <div class="date-bar-date" id="dateBarDate">—</div>
      <div class="date-bar-clocks">
        <span><span class="time-val" id="timeCT">—</span><span class="time-label">CT</span></span>
        <span><span class="time-val" id="timeUTC">—</span><span class="time-label">UTC</span></span>
      </div>
    </div>
  </div>

  <div class="alert-strip" id="alertStrip">
    <div class="alert-strip-inner-wrap">
      <div class="alert-strip-label"><span class="blink"></span> <span>Local Advisories</span></div>
      <div class="alert-strip-track" id="alertStripTrack">
        <div class="alert-strip-inner" id="alertStripInner">
          <span class="alert-strip-empty">Loading alerts…</span>
        </div>
      </div>
    </div>
  </div>

  <div class="sub-bar" id="subBar">
    <div class="sub-bar-inner">
      <a class="sub-btn" href="https://globe.adsbexchange.com/?lat=30.00&lon=-98.10&zoom=10" target="_blank" title="Live air traffic over Wimberley">
        ✈ In the Sky
      </a>
      <a class="sub-btn" href="comms.html" target="_blank" title="HAM Radio &amp; Emergency Comms Reference">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0">
          <line x1="6.5" y1="12" x2="6.5" y2="6" stroke="currentColor" stroke-width="1.2"/>
          <line x1="4" y1="12" x2="9" y2="12" stroke="currentColor" stroke-width="1.2"/>
          <line x1="6.5" y1="6" x2="2" y2="2" stroke="currentColor" stroke-width="1"/>
          <line x1="6.5" y1="6" x2="11" y2="2" stroke="currentColor" stroke-width="1"/>
          <line x1="6.5" y1="6" x2="1" y2="5" stroke="currentColor" stroke-width="1"/>
          <line x1="6.5" y1="6" x2="12" y2="5" stroke="currentColor" stroke-width="1"/>
          <circle cx="6.5" cy="5.5" r="1" fill="currentColor"/>
          <line x1="6.5" y1="1" x2="7.5" y2="3" stroke="currentColor" stroke-width="0.9" stroke-linecap="round"/>
          <line x1="7.5" y1="3" x2="6.5" y2="3" stroke="currentColor" stroke-width="0.9" stroke-linecap="round"/>
        </svg>
        Radio
      </a>
      <a class="sub-btn sub-btn-iss" href="https://www.heavens-above.com/PassSummary.aspx?satid=25544&lat=30.00&lng=-98.10&loc=Wimberley&alt=300&tz=CST" target="_blank" title="ISS pass times for Wimberley">
        <svg width="13" height="13" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0">
          <circle cx="7" cy="7" r="2.2" fill="currentColor" opacity="0.85"/>
          <ellipse cx="7" cy="7" rx="6" ry="3.2" stroke="currentColor" stroke-width="1" fill="none" opacity="0.55" transform="rotate(-30 7 7)"/>
          <circle cx="11.2" cy="4.6" r="1.1" fill="currentColor"/>
        </svg>
        ISS
      </a>
      <div class="sub-bar-weather" id="wxWidget" title="Current conditions in Wimberley, TX" style="margin-left:auto;">
        <span class="wx-icon" id="wxIcon">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" id="wxSvg">
            <circle cx="7" cy="7" r="3" fill="currentColor" opacity="0.3"/>
          </svg>
        </span>
        <span class="wx-temp" id="wxTemp">—°</span>
      </div>
    </div>
  </div>

  <div class="filter-bar">
    <div class="filter-bar-track">
      <button class="tab-arrow tab-arrow-left" id="tabArrowLeft" onclick="scrollTabs(-200)" aria-label="Scroll tabs left">&#8249;</button>
      <div class="filter-inner" id="filterInner">
        <button class="filter-tab" onclick="filterBy('wimberley', this)">Wimberley</button>
        <button class="filter-tab" onclick="filterBy('hill-country', this)">Hill Country</button>
        <button class="filter-tab" onclick="filterBy('texas', this)">Texas</button>

function isRelevant(article) {
  if (LOCAL_SOURCES.has(article.source)) return true;
  if (!RELEVANCE_KEYWORDS.length) return true;
  const haystack = (
    article.title + ' ' + article.summary + ' ' +
    (article.rawTitle || '') + ' ' + (article.rawSummary || '')
  ).toLowerCase();
  return RELEVANCE_KEYWORDS.some(kw => haystack.includes(kw));
}

  'best coffee','best tacos','restaurant review','bar review',
  'home decor','interior design','wedding','engagement announced',
];

// ─── DEDUPLICATION ────────────────────────────────────────────────────────────
// Strips a title down to a normalized fingerprint for comparison:
// lowercase, remove punctuation/stopwords, collapse whitespace.
function titleFingerprint(title) {
  return title.toLowerCase()
    .replace(/[^a-z0-9 ]/g, ' ')
    .replace(/\b(a|an|the|in|on|at|to|for|of|and|or|is|are|was|were|says|say)\b/g, ' ')
    .replace(/\s+/g, ' ')
    .trim();
}

// Given a sorted array of articles, remove duplicates by title similarity.
// Keeps the first occurrence (earliest in sort order = most recent date).
// Two articles are considered duplicates if their fingerprints share
// >= DEDUPE_THRESHOLD fraction of words.
const DEDUPE_THRESHOLD = 0.6; // 60% word overlap = duplicate

function deduplicate(articles) {
  const kept = [];
  const fingerprints = [];

  for (const article of articles) {
    const fp = titleFingerprint(article.title);
    const fpWords = new Set(fp.split(' ').filter(w => w.length > 2));
    if (!fpWords.size) { kept.push(article); continue; }

    const isDupe = fingerprints.some(existingWords => {
      const intersection = [...fpWords].filter(w => existingWords.has(w)).length;
      const union = new Set([...fpWords, ...existingWords]).size;
      return intersection / union >= DEDUPE_THRESHOLD;
    });

    if (!isDupe) {
      kept.push(article);
      fingerprints.push(fpWords);
    }
  }
  return kept;
}

function isBlocked(article) {
  const haystack = (article.title + ' ' + (article.summary || '')).toLowerCase();
  return BLOCK_KEYWORDS.some(kw => haystack.includes(kw));
}

// ─── TRANSLATION ──────────────────────────────────────────────────────────────
// Only 3 Spanish-language feeds — within the safe threshold for MyMemory free tier.
const TRANSLATE_API = 'https://api.mymemory.translated.net/get';
async function translate(text, fromLang = 'es') {
  if (!text || !text.trim()) return text;
  try {
    const params = new URLSearchParams({ q: text.slice(0, 500), langpair: fromLang + '|en' });
    const r = await fetch(TRANSLATE_API + '?' + params, { signal: AbortSignal.timeout(6000) });
    const d = await r.json();
    if (d.responseStatus === 200 && d.responseData?.translatedText) return d.responseData.translatedText;
  } catch (e) {}
  return text;
}

// ─── PROXY HELPERS ────────────────────────────────────────────────────────────
function parseRSSXml(xml) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(xml, 'text/xml');
  const items = [...doc.querySelectorAll('item')];
  if (!items.length) throw new Error('No items');
  return items.map(item => {
    let link = '';
    const linkEl = item.querySelector('link');
    if (linkEl) {
      link = linkEl.textContent || linkEl.getAttribute('href') || '';
      if (!link && linkEl.nextSibling) link = linkEl.nextSibling.textContent || '';
    }
    if (!link) link = item.querySelector('guid')?.textContent || '#';
    return {
      title: item.querySelector('title')?.textContent || '',
      description: item.querySelector('description')?.textContent || '',
      link: link.trim(),
      pubDate: item.querySelector('pubDate')?.textContent || '',
    };
  });
}

async function tryRss2Json(url) {
  const r = await fetch('https://api.rss2json.com/v1/api.json?count=8&rss_url=' + encodeURIComponent(url), { signal: AbortSignal.timeout(9000) });
  const d = await r.json();
  if (d.status !== 'ok' || !d.items?.length) throw new Error('rss2json: no items');
  return d.items.map(i => ({ title: i.title, description: i.description, link: i.link || i.guid, pubDate: i.pubDate }));
}

async function tryAllOrigins(url) {
  const r = await fetch('https://api.allorigins.win/get?url=' + encodeURIComponent(url), { signal: AbortSignal.timeout(9000) });
  const d = await r.json();
  if (!d.contents) throw new Error('allorigins: empty');
  return parseRSSXml(d.contents);
}

async function tryCorsProxy(url) {
  const r = await fetch('https://corsproxy.io/?' + encodeURIComponent(url), { signal: AbortSignal.timeout(9000) });
  const xml = await r.text();
  return parseRSSXml(xml);
}

async function fetchFeedItems(url) {
  for (const fn of [tryRss2Json, tryAllOrigins, tryCorsProxy]) {
    try {
      const items = await fn(url);
      if (items && items.length) return items;
    } catch (e) {}
  }
  throw new Error('All proxies failed for: ' + url);
}

// ─── FETCH ONE FEED ───────────────────────────────────────────────────────────
async function fetchFeed(feed) {
  try {
    const items = await fetchFeedItems(feed.url);
    const needsTranslation = feed.lang && feed.lang !== 'en';
    const articles = await Promise.all(items.slice(0, feed.max || 8).map(async item => {
      const rawTitle = (item.title || '').trim();
      let rawSummary = (item.description || '').replace(/<[^>]+>/g, '').replace(/&[a-z#0-9]+;/gi, ' ').replace(/\s+/g, ' ').trim();
      if (rawSummary.length > 180) rawSummary = rawSummary.slice(0, 180) + '…';

      let title = rawTitle;
      let summary = rawSummary;

      if (needsTranslation && rawTitle) {
        [title, summary] = await Promise.all([
          translate(rawTitle, feed.lang),
          rawSummary ? translate(rawSummary, feed.lang) : Promise.resolve(''),
        ]);
        if (!title) title = rawTitle;
        if (!summary) summary = rawSummary;
      }

      return {
        title: title.trim(),
        summary: summary.trim(),
        rawTitle,
        rawSummary,
        link: item.link || '#',
        source: feed.name,
        lang: feed.lang,
        tags: feed.tags,
        date: item.pubDate ? new Date(item.pubDate) : new Date(),
      };
    }));
    sourceStatus[feed.name] = 'ok';
    return articles.filter(a => a.title && isRelevant(a) && !isBlocked(a));
  } catch (e) {
    sourceStatus[feed.name] = 'error';
    return [];
  }
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function timeAgo(date) {
  const diff = (Date.now() - date.getTime()) / 1000;
  if (isNaN(diff) || diff < 0) return '';
  if (diff < 60) return 'just now';
  if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
  if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
  return Math.floor(diff / 86400) + 'd ago';
}

function renderCards(articles) {
  const container = document.getElementById('newsContainer');
  container.innerHTML = '';

  if (!articles.length) {
    container.innerHTML = '<div class="empty-state"><h3>No stories found</h3><p>Some feeds may be temporarily unavailable.<br>Check the source status below or try refreshing.</p></div>';
    document.getElementById('storyCount').textContent = '0 stories';
    return;
  }

  const grid = document.createElement('div');
  grid.className = 'news-grid';

  articles.forEach(a => {
    const card = document.createElement('a');
    card.className = 'card';
    card.href = a.link;
    card.target = '_blank';
    card.rel = 'noopener noreferrer';
    const ago = timeAgo(a.date);
    const langLabel = a.lang === 'es' ? 'ES→EN' : 'EN';
    card.innerHTML =
      '<div class="card-meta">' +
        '<span class="card-source">' + a.source + '</span>' +
        '<span class="card-lang">' + langLabel + '</span>' +
      '</div>' +
      '<div class="card-title">' + a.title + '</div>' +
      (a.summary ? '<div class="card-summary">' + a.summary + '</div>' : '') +
      '<div class="card-footer">' +
        '<span class="card-time">' + ago + '</span>' +
        '<span class="card-arrow">&#x2192;</span>' +
      '</div>';
    grid.appendChild(card);
  });

  container.appendChild(grid);
  document.getElementById('storyCount').textContent = articles.length + ' stor' + (articles.length !== 1 ? 'ies' : 'y');
}

function renderSourcePills() {
  const list = document.getElementById('sourcesList');
  list.innerHTML = FEEDS.map(f => {
    const s = sourceStatus[f.name];
    const cls = s === 'ok' ? 'ok' : s === 'error' ? 'err' : '';
    return '<span class="source-pill ' + cls + '">' + f.name + '</span>';
  }).join('');
}

// ─── SEARCH & TIME FILTER ─────────────────────────────────────────────────────
function setTimeFilter(hours, el) {
  currentTimeHours = hours;
  document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  applyDisplayFilters();
}

function applyDisplayFilters() {
  const query = (document.getElementById('searchInput')?.value || '').toLowerCase().trim();
  const isBreakingTab = currentFilter === 'breaking';

  let filtered = allArticles.filter(a => a.tags.includes(currentFilter));

  // Breaking defaults to 8h; otherwise use the user's selected time filter
  const effectiveHours = currentTimeHours;
  if (effectiveHours > 0) {
    const cutoff = Date.now() - effectiveHours * 3600 * 1000;
    filtered = filtered.filter(a => a.date && a.date.getTime() >= cutoff);
  }

  if (query) {
    filtered = filtered.filter(a =>
      a.title.toLowerCase().includes(query) ||
      (a.summary && a.summary.toLowerCase().includes(query))
    );
  }

  renderCards(filtered);
}

// ─── FILTER ───────────────────────────────────────────────────────────────────
function filterBy(tag, el) {
  currentFilter = tag;
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  if (el) el.classList.add('active');
  // Breaking tab: visually highlight the 8h button to signal the auto-filter
  if (tag === 'breaking') {
    document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
    const btn8 = document.querySelector('.time-btn[data-hours="8"]');
    if (btn8) btn8.classList.add('active');
  }
  applyDisplayFilters();
}

// ─── TAB SCROLL ARROWS ───────────────────────────────────────────────────────
function scrollTabs(px) {
  const el = document.getElementById('filterInner');
  if (el) el.scrollBy({ left: px, behavior: 'smooth' });
}

function updateTabArrows() {
  const el = document.getElementById('filterInner');
  const left = document.getElementById('tabArrowLeft');
  const right = document.getElementById('tabArrowRight');
  if (!el || !left || !right) return;
  const atStart = el.scrollLeft <= 4;
  const atEnd = el.scrollLeft + el.clientWidth >= el.scrollWidth - 4;
  left.classList.toggle('visible', !atStart);
  right.classList.toggle('visible', !atEnd);
}

// ─── MAIN LOAD ────────────────────────────────────────────────────────────────
async function loadAllFeeds() {
  const btn = document.getElementById('refreshBtn');
  const icon = document.getElementById('refreshIcon');

  btn.classList.add('loading');
  icon.className = 'spin';
  icon.textContent = '↻';
  sourceStatus = {};

  // Show loading overlay — appended to body so innerHTML resets can't wipe it
  const existingOverlay = document.getElementById('loadingOverlay');
  if (existingOverlay) existingOverlay.remove();
  const ov = document.createElement('div');
  ov.id = 'loadingOverlay';
  ov.className = 'loading-overlay';
  ov.innerHTML = '<div class="loading-overlay-dot"></div><div class="loading-overlay-text">Fetching feeds…</div>';
  document.body.appendChild(ov);

  document.getElementById('newsContainer').innerHTML =
    '<div class="skeleton-grid">' +
    Array(6).fill('<div class="skeleton-card"><div class="skel" style="height:10px;width:30%;margin-bottom:4px"></div><div class="skel" style="height:18px;width:88%"></div><div class="skel" style="height:13px;width:70%"></div><div class="skel" style="height:9px;width:20%"></div></div>').join('') +
    '</div>';

  const [results, nwsAlerts, burnBanArticle] = await Promise.all([
    Promise.allSettled(FEEDS.map(f => fetchFeed(f))),
    fetchNWSAlerts(),
    fetchBurnBan()
  ]);
  const rawArticles = results.flatMap(r => r.status === 'fulfilled' ? r.value : []);
  const combined = [...rawArticles, ...nwsAlerts, ...(burnBanArticle ? [burnBanArticle] : [])];
  const sorted = combined.sort((a, b) => b.date - a.date);
  allArticles = deduplicate(sorted);

  const okCount = Object.values(sourceStatus).filter(s => s === 'ok').length;

  // Remove overlay
  document.getElementById('loadingOverlay')?.remove();

  btn.classList.remove('loading');
  icon.className = '';
  icon.textContent = '↻';


  renderSourcePills();
  renderAlertStrip();
  applyDisplayFilters();
  lastLoadTime = Date.now();
}

// ─── ALERT STRIP ──────────────────────────────────────────────────────────────
function renderAlertStrip() {
  const ADVISORY_KEYWORDS = [
    'wimberley','hays county','hays co','blanco river','cypress creek',
    'hill country','comal county','san marcos','kyle','buda','dripping springs',
    'wimberley valley','woodcreek','lcra','gbra','eaa','aquifer',
    "jacob's well",'jacobs well',"devil's backbone",'devils backbone',
    'texas hill country','central texas',
    'flash flood warning','flash flood watch','flood warning','flood watch',
    'tornado warning','tornado watch','severe thunderstorm',
    'winter storm warning','fire weather watch','red flag warning',
    'drought','wildfire','wildfire warning','evacuation order','evacuation warning',
    'burn ban'
  ];

  const NWS_SOURCES = new Set(['NWS Austin / San Antonio', 'Comal County · Alerts']);
  const NWS_DIRECT = new Set(['NWS · Hays County']);

  const cutoff = Date.now() - 8 * 3600 * 1000;
  const alerts = allArticles
    .filter(a => {
      if (!a.tags.includes('breaking')) return false;
      // NWS · Hays County alerts use their own expires time — always pass if still active
      if (NWS_DIRECT.has(a.source)) return true;
      if (!a.date || a.date.getTime() < cutoff) return false;
      const hay = (a.title + ' ' + (a.summary || '') + ' ' + (a.rawTitle || '')).toLowerCase();
      if (NWS_SOURCES.has(a.source)) {
        return hay.includes('hays') || hay.includes('wimberley');
      }
      return ADVISORY_KEYWORDS.some(kw => hay.includes(kw));
    })
    .slice(0, 20);

  const inner = document.getElementById('alertStripInner');
  if (!inner) return;

  if (!alerts.length) {
    inner.innerHTML = '<span class="alert-strip-empty">No active advisories</span>';
    inner.style.animation = 'none';
    return;
  }

  const track = document.getElementById('alertStripTrack');
  const trackWidth = track ? track.offsetWidth : 800;

  // ── Solo burn ban: exact-width spacer so one unit = one track width ──────────
  // Measures the chip precisely, fills the remainder with a fixed-width dot spacer.
  // The seamless double means the second copy enters the right edge the instant
  // the first exits the left — no pop, no gap.
  if (alerts.length === 1 && alerts[0].isBurnBan) {
    const a = alerts[0];
    const chipHtml = '<a class="burn-ban-chip" href="' + a.link + '" target="_blank" rel="noopener noreferrer">' +
      '<span class="burn-ban-chip-label">Burn Ban ON</span></a>';

    // Measure chip width
    inner.innerHTML = chipHtml;
    const chipW = inner.scrollWidth;
    inner.innerHTML = '';

    const gapW = trackWidth - chipW;
    const spacer = '<span class="burn-ban-dots" style="display:inline-block;width:' + gapW + 'px;overflow:hidden;">' +
      '· · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · · ·' +
      '</span>';

    const unit = chipHtml + spacer;
    inner.innerHTML = unit + unit;
    inner.style.animation = '';
    const duration = Math.max(14, Math.round(trackWidth / 80));
    inner.style.animationDuration = duration + 's';
    return;
  }

  // ── Normal alerts (or burn ban mixed with others) ─────────────────────────────
  const buildItems = () => alerts.map(a => {
    if (a.isBurnBan) {
      return '<a class="burn-ban-chip" href="' + a.link + '" target="_blank" rel="noopener noreferrer">' +
        '<span class="burn-ban-chip-label">Burn Ban ON</span>' +
        '</a><span class="alert-sep">·</span>';
    }
    const ago = timeAgo(a.date);
    return '<a class="alert-item" href="' + a.link + '" target="_blank" rel="noopener noreferrer">' +
      '<span class="alert-item-source">' + a.source + '</span>' +
      '<span class="alert-item-title">' + a.title + '</span>' +
      '<span class="alert-item-time">' + ago + '</span>' +
      '</a><span class="alert-sep">·</span>';
  }).join('');

  // Repeat until content is wide enough to scroll naturally, then double for seamless loop
  const minWidth = trackWidth * 2.5;
  const estItemWidth = 160;
  const repeats = Math.max(1, Math.ceil(minWidth / (alerts.length * estItemWidth)));
  let padded = '';
  for (let i = 0; i < repeats; i++) padded += buildItems();
  inner.innerHTML = padded + padded;
  inner.style.animation = '';

  const contentWidth = inner.scrollWidth / 2;
  const duration = Math.max(20, Math.round(contentWidth / 80));
  inner.style.animationDuration = duration + 's';
}


// ─── NWS ALERTS (api.weather.gov) ────────────────────────────────────────────
// Fetches active NWS alerts for Hays County (TXZ191) directly from the
// api.weather.gov GeoJSON endpoint — no proxy needed, CORS-permissive.
// Each alert is mapped into an article-shaped object and merged into allArticles.
// Uses the alert's own 'expires' timestamp rather than the generic 8h cutoff.
async function fetchNWSAlerts() {
  try {
    const r = await fetch('https://api.weather.gov/alerts/active?zone=TXZ191', {
      headers: { 'User-Agent': 'WimberleyWatchtower/1.0 (wimberley-watchtower)' },
      signal: AbortSignal.timeout(9000)
    });
    if (!r.ok) return [];
    const data = await r.json();
    const features = data.features || [];
    const now = Date.now();
    return features
      .map(f => {
        const p = f.properties;
        const expires = p.expires ? new Date(p.expires) : null;
        // Skip already-expired alerts
        if (expires && expires.getTime() < now) return null;
        const sent = p.sent ? new Date(p.sent) : new Date();
        const headline = p.headline || p.event || 'NWS Alert';
        const description = p.description
          ? p.description.replace(/\s+/g, ' ').trim().slice(0, 180) + '\u2026'
          : '';
        return {
          title: headline,
          summary: description,
          rawTitle: headline,
          rawSummary: description,
          link: 'https://www.weather.gov/ewx',
          source: 'NWS \u00b7 Hays County',
          lang: 'en',
          tags: ['weather-disasters', 'breaking'],
          date: sent,
          nwsExpires: expires
        };
      })
      .filter(Boolean);
  } catch(e) {
    return [];
  }
}

// ─── BURN BAN CHECK (Texas A&M Forest Service ArcGIS) ────────────────────────
// Queries the TFS statewide burn ban FeatureServer for Hays County.
// Caches result for 24 hours — re-checks on page load if stale.
// If BurnBan === 'Yes', injects a synthetic article into allArticles so it
// appears in the ticker and on the Wimberley/weather-disasters tabs.
let burnBanCache = null; // { status: 'Yes'|'No', checkedAt: timestamp }

async function fetchBurnBan() {
  const CACHE_MS = 24 * 60 * 60 * 1000; // 24 hours
  const now = Date.now();
  if (burnBanCache && (now - burnBanCache.checkedAt) < CACHE_MS) {
    return burnBanCache.status === 'Yes' ? makeBurnBanArticle() : null;
  }
  try {
    const url = "https://tfsgis.tfs.tamu.edu/arcgis/rest/services/BurnBan/BurnBan/MapServer/0/query" +
      "?where=County%3D'Hays'&outFields=County,BurnBan,StartDate&f=json";
    const r = await fetch(url, { signal: AbortSignal.timeout(8000) });
    if (!r.ok) return null;
    const data = await r.json();
    const feat = data.features && data.features[0];
    const status = feat ? (feat.attributes.BurnBan || 'No') : 'No';
    burnBanCache = { status, checkedAt: now };
    return status === 'Yes' ? makeBurnBanArticle() : null;
  } catch(e) {
    return null;
  }
}

function makeBurnBanArticle() {
  return {
    title: 'Burn Ban: ON',
    summary: 'Hays County burn ban is currently in effect.',
    rawTitle: 'Burn Ban: ON',
    rawSummary: '',
    link: 'https://www.haysinformed.com/',
    source: 'Hays County Fire Marshal',
    lang: 'en',
    tags: ['wimberley', 'weather-disasters', 'breaking'],
    date: new Date(),
    isBurnBan: true
  };
}

  if (code <= 67) return '<path d="M2.5 7 Q1 7 1 5.5 Q1 4 2.5 3.7 Q3 1.5 5.5 1.5 Q7.8 1.5 8.5 3.5 Q10.5 3.5 11 5.5 Q11 7 9.5 7Z" fill="currentColor" opacity="0.8"/><line x1="4" y1="9" x2="3.5" y2="11" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/><line x1="7" y1="9" x2="6.5" y2="11" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/><line x1="10" y1="9" x2="9.5" y2="11" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>';

  if (code <= 77) return '<path d="M2.5 7 Q1 7 1 5.5 Q1 4 2.5 3.7 Q3 1.5 5.5 1.5 Q7.8 1.5 8.5 3.5 Q10.5 3.5 11 5.5 Q11 7 9.5 7Z" fill="currentColor" opacity="0.7"/><line x1="4" y1="9" x2="4" y2="12" stroke="currentColor" stroke-width="1" stroke-linecap="round"/><line x1="2.5" y1="10.5" x2="5.5" y2="10.5" stroke="currentColor" stroke-width="1" stroke-linecap="round"/><line x1="7.5" y1="9" x2="7.5" y2="12" stroke="currentColor" stroke-width="1" stroke-linecap="round"/><line x1="6" y1="10.5" x2="9" y2="10.5" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>';
  // Thunderstorm
  return '<path d="M1.5 7.5 Q0.5 7.5 0.5 6 Q0.5 4.5 2 4.2 Q2.5 2 5 2 Q7.3 2 8 4 Q10 4 10.5 6 Q10.5 7.5 9 7.5Z" fill="currentColor" opacity="0.8"/><polyline points="6,7.5 4.5,10 6.5,10 5,13" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>';
}

async function fetchWeather() {
  try {
    const r = await fetch('https://api.open-meteo.com/v1/forecast?latitude=30.00&longitude=-98.10&current=temperature_2m,weathercode&temperature_unit=fahrenheit&timezone=America%2FChicago', { signal: AbortSignal.timeout(6000) });
    const d = await r.json();
    const temp = Math.round(d.current.temperature_2m);
    const code = d.current.weathercode;
    const tempEl = document.getElementById('wxTemp');
    const svgEl = document.getElementById('wxSvg');
    if (tempEl) tempEl.textContent = temp + '°';
    if (svgEl) svgEl.innerHTML = wxSvgPath(code);
  } catch(e) {
    // silently fail — widget stays at —°
  }
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
// Set Wimberley as the default active tab BEFORE loading feeds
currentFilter = 'wimberley';
document.querySelectorAll('.filter-tab').forEach(t => {
  if (t.getAttribute('onclick') && t.getAttribute('onclick').includes("'wimberley'")) {
    t.classList.add('active');
  }
});
function updateClocks() {
  const now = new Date();
  const ctEl = document.getElementById('timeCT');
  const utcEl = document.getElementById('timeUTC');
  const dateEl = document.getElementById('dateBarDate');
  if (ctEl) ctEl.textContent = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', timeZone: 'America/Chicago', hour12: false });
  if (utcEl) utcEl.textContent = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', timeZone: 'UTC', hour12: false }) + 'Z';
  if (dateEl) dateEl.textContent = now.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', timeZone: 'America/Chicago' });
}
updateClocks();
setInterval(updateClocks, 60 * 1000);

loadAllFeeds();
fetchWeather();
setInterval(fetchWeather, 15 * 60 * 1000); // refresh weather every 15 min
// Wire up tab arrow visibility on scroll and resize
window.addEventListener('load', () => {
  const el = document.getElementById('filterInner');
  if (el) {
    el.addEventListener('scroll', updateTabArrows);
    updateTabArrows();
  }
});
window.addEventListener('resize', updateTabArrows);

// ─── AUTO-REFRESH ─────────────────────────────────────────────────────────────
// 1. Staleness check on tab restore — if you return after 1+ hour, reload immediately
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') {
    const hoursSince = (Date.now() - lastLoadTime) / 3600000;
    if (hoursSince >= 1) loadAllFeeds();
  }
});
// 2. Background interval — quietly refresh every 30 minutes while tab is visible
setInterval(() => {
  if (document.visibilityState === 'visible') loadAllFeeds();
}, 30 * 60 * 1000);
</script>
